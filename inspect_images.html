<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Inspect Template Images</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      gap: 40px;
      background: #1a1a1a;
      color: #fff;
      font-family: sans-serif;
      padding: 40px;
    }
    .card {
      text-align: center;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 8px;
      background: #222;
    }
    img {
      max-width: 450px;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>1.png</h2>
    <img src="1.png" alt="Template 1">
  </div>
  <div class="card">
    <h2>2.png</h2>
    <img src="2.png" alt="Template 2">
  </div>
</body>
</html>
